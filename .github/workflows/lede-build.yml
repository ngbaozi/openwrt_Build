name: Build OpenWrt-lean (With Custom Plugins)

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-openwrt.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
          libssl-dev libtool llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 \
          python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
          uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt autoremove -y
          sudo apt clean -y

      - name: Clone Lean's OpenWrt Source
        run: |
          git clone --depth=1 https://github.com/coolsnowwolf/lede openwrt
          cd openwrt

      - name: Add Custom Feeds (kenzo/small/Lienol)
        run: |
          cd openwrt
          echo 'src-git kenzo https://github.com/kenzok8/openwrt-packages' >> feeds.conf.default
          echo 'src-git small https://github.com/kenzok8/small' >> feeds.conf.default
          echo 'src-git Lienol https://github.com/Lienol/openwrt-package' >> feeds.conf.default

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Default Config & Enable Custom Plugins
        run: |
          cd openwrt
          # 生成默认配置
          make defconfig
          # 启用指定插件/主题（通过配置文件追加）
          cat >> .config <<EOF
          # 科学上网类
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          # 广告拦截/网络过滤
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-adbyby-plus=y
          # 网络加速/优化
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_luci-app-broadbandacc=y
          CONFIG_PACKAGE_luci-app-fastnet=y
          CONFIG_PACKAGE_luci-app-uugamebooster=y
          # 多线/拨号
          CONFIG_PACKAGE_luci-app-mwan3=y
          CONFIG_PACKAGE_luci-app-syncdial=y
          CONFIG_PACKAGE_luci-app-ap-modem=y
          # 文件管理/共享
          CONFIG_PACKAGE_luci-app-filebrowser=y
          CONFIG_PACKAGE_luci-app-samba4=y
          # 其他工具
          CONFIG_PACKAGE_luci-app-openlist2=y
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          # 主题
          CONFIG_PACKAGE_luci-theme-argon=y
          EOF
          # 自动补全配置依赖
          make defconfig

      - name: Download Dependencies
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile OpenWrt Firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-Firmware-Custom
          path: openwrt/bin/targets/
          retention-days: 30
